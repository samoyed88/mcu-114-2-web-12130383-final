<h2>產品清單</h2>
<div class="search-bar">
  <input type="text" placeholder="輸入產品名稱查詢" #searchInput />
  <button type="button" (click)="onSearch(searchInput.value)">查詢</button>
</div>
<div class="info">共 {{ totalCount }} 筆產品（已隱藏未上架產品）</div>
<div class="product-list">
  @for (product of products; track product.id) {
    <app-product-card
      [id]="product.id"
      [name]="product.name"
      [authors]="product.authors"
      [company]="product.company"
      [price]="product.price"
      [discount]="product.discount"
      [imgUrl]="product.imgUrl"
      [createDate]="product.createDate"
      (view)="onView($event)"
      (addToCart)="onAddToCart($event)"
    ></app-product-card>
  } @empty {
    <div class="data-empty">無產品資料</div>
  }
</div>
<app-pagination [totalCount]="totalCount" [pageSize]="pageSize()" [(pageIndex)]="pageIndex"></app-pagination>
