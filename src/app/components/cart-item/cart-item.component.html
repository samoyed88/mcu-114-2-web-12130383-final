<span class="item-id">{{ item().product.id }}</span>
<span class="item-name">{{ item().product.name }}</span>
<input
  type="number"
  [value]="item().quantity"
  min="1"
  (change)="onQuantityChange($event)"
/>
<span class="item-subtotal">{{ subtotal() | currency: 'TWD': 'symbol': '1.2-2' }}</span>
<button type="button" class="remove-btn" (click)="remove.emit(item().product.id)">刪除</button>
